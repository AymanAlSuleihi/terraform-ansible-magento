---
- name: Provision Magento host
  hosts: magento_servers
  become: true
  gather_facts: true
  force_handlers: true

  pre_tasks:
    - name: Load local Magento deploy vars
      ansible.builtin.include_vars:
        file: "{{ playbook_dir | dirname }}/vars/magento-deploy.yml"
      when: >-
        lookup(
          'ansible.builtin.fileglob',
          (playbook_dir | dirname) ~ '/vars/magento-deploy.yml',
          wantlist=True
        ) | length > 0

    - name: Load generated Magento deploy vars
      ansible.builtin.include_vars:
        file: "{{ playbook_dir | dirname }}/vars/magento-deploy.generated.yml"
      when: >-
        lookup(
          'ansible.builtin.fileglob',
          (playbook_dir | dirname) ~ '/vars/magento-deploy.generated.yml',
          wantlist=True
        ) | length > 0

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - magento_domain | length > 0
          - magento_deploy_mode in ['default', 'developer', 'production']
          - (not magento_enable_https) or magento_letsencrypt_email | length > 0
          - magento_db_password | length > 0
          - magento_repo_public_key | length > 0
          - magento_repo_private_key | length > 0
          - magento_admin_email | length > 0
          - magento_admin_password | length > 0
          - magento_admin_password | lower != magento_admin_user | lower
          - magento_admin_password is match('^(?=.*[A-Za-z])(?=.*\d).{7,}$')
          - magento_opensearch_initial_admin_password | length > 0
          - magento_opensearch_initial_admin_password is match('^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$')
          - magento_phpmyadmin_uri_path is match('^/[A-Za-z0-9_-]+/$')
          - magento_phpmyadmin_basic_auth_user is match('^[A-Za-z0-9._-]+$')
          - magento_phpmyadmin_basic_auth_password | length >= 16
          - magento_phpmyadmin_config_storage_database is match('^[A-Za-z0-9_]+$')
          - magento_phpmyadmin_config_storage_user is match('^[A-Za-z0-9._-]+$')
          - magento_phpmyadmin_config_storage_password | length >= 16
        fail_msg: >-
          Populate the required Magento variables in ansible/vars/magento-deploy.yml,
          ansible/vars/magento-deploy.generated.yml, ansible/group_vars/magento_servers.yml,
          or an Ansible Vault file before running this playbook. The Magento deploy
          mode must be one of default, developer, or production. The Magento
          admin password must not match the admin username, must be at least 7
          characters, and must include both letters and digits. The OpenSearch
          package post-install script also requires magento_opensearch_initial_admin_password
          to be at least 8 characters and include uppercase, lowercase, digit,
          and special characters, even if security is disabled later in opensearch.yml.
          phpMyAdmin also requires a random hidden URI path such as /db-console-rotate-me/,
          a safe basic auth username, a basic auth password with at least 16 characters,
          and a configuration storage password with at least 16 characters.

  roles:
    - role: common
    - role: repositories
    - role: php
    - role: mariadb
    - role: phpmyadmin
    - role: opensearch

  tasks:
    - name: Prepare Magento project files
      ansible.builtin.include_role:
        name: magento
        tasks_from: project

    - name: Render initial nginx configuration
      ansible.builtin.include_role:
        name: nginx

    - name: Apply pending handler changes before certificate issuance
      ansible.builtin.meta: flush_handlers

    - name: Obtain Let's Encrypt certificate
      ansible.builtin.include_role:
        name: ssl
      when: magento_enable_https | bool

    - name: Render final nginx configuration
      ansible.builtin.include_role:
        name: nginx

    - name: Apply pending handler changes after final nginx render
      ansible.builtin.meta: flush_handlers

    - name: Install Magento application
      ansible.builtin.include_role:
        name: magento
        tasks_from: install
