---
- name: Install Magento application
  ansible.builtin.command:
    argv: "{{ magento_setup_install_args }}"
  become: true
  become_user: "{{ magento_app_user }}"
  no_log: true
  args:
    creates: "{{ magento_app_root }}/app/etc/env.php"
  vars:
    magento_setup_install_args: >-
      {{
        [
          magento_app_root ~ '/bin/magento',
          'setup:install',
          '--base-url=' ~ magento_base_url,
          '--db-host=127.0.0.1',
          '--db-name=' ~ magento_db_name,
          '--db-user=' ~ magento_db_user,
          '--db-password=' ~ magento_db_password,
          '--search-engine=opensearch',
          '--opensearch-host=127.0.0.1',
          '--opensearch-port=9200',
          '--opensearch-index-prefix=' ~ magento_opensearch_index_prefix,
          '--opensearch-timeout=15',
          '--admin-firstname=' ~ magento_admin_firstname,
          '--admin-lastname=' ~ magento_admin_lastname,
          '--admin-email=' ~ magento_admin_email,
          '--admin-user=' ~ magento_admin_user,
          '--admin-password=' ~ magento_admin_password,
          '--language=' ~ magento_language,
          '--currency=' ~ magento_currency,
          '--timezone=' ~ magento_timezone,
          '--use-rewrites=1'
        ]
        + (
          [
            '--use-secure=1',
            '--base-url-secure=' ~ magento_base_url,
            '--use-secure-admin=1'
          ] if magento_enable_https | bool else []
        )
      }}

- name: Read current Magento secure store configuration
  ansible.builtin.command:
    argv:
      - "{{ magento_app_root }}/bin/magento"
      - config:show
      - "{{ item.path }}"
  become: true
  become_user: "{{ magento_app_user }}"
  loop:
    - key: base_url
      path: web/unsecure/base_url
    - key: base_url_secure
      path: web/secure/base_url
    - key: use_in_frontend
      path: web/secure/use_in_frontend
    - key: use_in_adminhtml
      path: web/secure/use_in_adminhtml
  loop_control:
    label: "{{ item.path }}"
  register: magento_secure_store_configuration_current
  changed_when: false
  when: magento_enable_https | bool

- name: Map current Magento secure store configuration values
  ansible.builtin.set_fact:
    magento_secure_store_configuration_values: >-
      {{
        magento_secure_store_configuration_values | default({})
        | combine({item.item.key: item.stdout})
      }}
  loop: "{{ magento_secure_store_configuration_current.results }}"
  when: magento_enable_https | bool

- name: Ensure Magento secure store configuration matches the desired base URL
  ansible.builtin.command:
    argv:
      - "{{ magento_app_root }}/bin/magento"
      - setup:store-config:set
      - "--base-url={{ magento_base_url }}"
      - "--base-url-secure={{ magento_base_url }}"
      - --use-secure=1
      - --use-secure-admin=1
  become: true
  become_user: "{{ magento_app_user }}"
  register: magento_secure_store_configuration_update
  changed_when: true
  when:
    - magento_enable_https | bool
    - >-
      magento_secure_store_configuration_values.base_url | default('') != magento_base_url
      or magento_secure_store_configuration_values.base_url_secure | default('') != magento_base_url
      or magento_secure_store_configuration_values.use_in_frontend | default('') != '1'
      or magento_secure_store_configuration_values.use_in_adminhtml | default('') != '1'

- name: Flush Magento cache after secure store configuration changes
  ansible.builtin.command:
    argv:
      - "{{ magento_app_root }}/bin/magento"
      - cache:flush
  become: true
  become_user: "{{ magento_app_user }}"
  changed_when: true
  when:
    - magento_enable_https | bool
    - magento_secure_store_configuration_update is changed

- name: Read current Magento deployment mode
  ansible.builtin.command:
    argv:
      - "{{ magento_app_root }}/bin/magento"
      - deploy:mode:show
  become: true
  become_user: "{{ magento_app_user }}"
  register: magento_deploy_mode_current
  changed_when: false

- name: Extract current Magento deployment mode
  ansible.builtin.set_fact:
    magento_current_deploy_mode: >-
      {{
        magento_deploy_mode_current.stdout
        | trim
        | regex_replace('^Current application mode: ([A-Za-z]+).*$','\1')
      }}

- name: Check whether the post-install build marker exists
  ansible.builtin.stat:
    path: "{{ magento_app_root }}/var/.ansible_build_complete"
  register: magento_post_install_build_marker

- name: Set Magento deployment mode
  ansible.builtin.command:
    argv: "{{ magento_deploy_mode_set_args }}"
  become: true
  become_user: "{{ magento_app_user }}"
  changed_when: true
  vars:
    magento_deploy_mode_set_args: >-
      {{
        [
          magento_app_root ~ '/bin/magento',
          'deploy:mode:set',
          magento_deploy_mode
        ]
        + (
          ['--skip-compilation'] if magento_deploy_mode == 'production' else []
        )
      }}
  when: magento_current_deploy_mode != magento_deploy_mode

- name: Determine whether Magento build steps are required
  ansible.builtin.set_fact:
    magento_post_install_build_required: >-
      {{
        not magento_post_install_build_marker.stat.exists
        or magento_current_deploy_mode != magento_deploy_mode
        or (magento_patches_reapplied | default(false))
      }}

- name: Compile Magento dependency injection artifacts
  ansible.builtin.command:
    argv:
      - "{{ magento_app_root }}/bin/magento"
      - setup:di:compile
  become: true
  become_user: "{{ magento_app_user }}"
  changed_when: true
  when:
    - magento_deploy_mode == 'production'
    - magento_post_install_build_required

- name: Deploy Magento static content
  ansible.builtin.command:
    argv: >-
      {{
        [
          magento_app_root ~ '/bin/magento',
          'setup:static-content:deploy',
          magento_locale
        ]
        + (
          ['--force'] if magento_deploy_mode != 'production' else []
        )
      }}
  become: true
  become_user: "{{ magento_app_user }}"
  register: magento_static_content_deploy
  changed_when: true
  when: magento_post_install_build_required

- name: Record completion of the post-install build steps
  ansible.builtin.file:
    path: "{{ magento_app_root }}/var/.ansible_build_complete"
    state: touch
    owner: "{{ magento_app_user }}"
    group: "{{ magento_app_group }}"
    mode: "0644"
  when:
    - magento_static_content_deploy is defined
    - magento_static_content_deploy is changed

- name: Flush Magento cache after patch updates
  ansible.builtin.command:
    argv:
      - "{{ magento_app_root }}/bin/magento"
      - cache:flush
  become: true
  become_user: "{{ magento_app_user }}"
  changed_when: true
  when: magento_patches_reapplied | default(false)

- name: Read current Magento crontab
  ansible.builtin.command:
    argv:
      - crontab
      - -l
  become: true
  become_user: "{{ magento_app_user }}"
  register: magento_current_crontab
  changed_when: false
  failed_when: magento_current_crontab.rc not in [0, 1]

- name: Ensure Magento cron jobs are installed
  ansible.builtin.command:
    argv:
      - "{{ magento_app_root }}/bin/magento"
      - cron:install
      - --force
  become: true
  become_user: "{{ magento_app_user }}"
  register: magento_cron_install
  changed_when: true
  when:
    - magento_current_crontab.rc != 0
      or '#~ MAGENTO START' not in magento_current_crontab.stdout
      or '#~ MAGENTO END' not in magento_current_crontab.stdout
      or magento_app_root not in magento_current_crontab.stdout
      or 'update/cron.php' in magento_current_crontab.stdout
      or 'setup:cron:run' in magento_current_crontab.stdout

- name: Find Magento configuration paths that are still group writable
  ansible.builtin.command:
    argv:
      - find
      - "{{ magento_app_root }}/app/etc"
      - -perm
      - /020
      - -print
  register: magento_configuration_paths_with_group_write
  changed_when: false

- name: Remove group write permission from Magento configuration paths
  ansible.builtin.command:
    argv:
      - find
      - "{{ magento_app_root }}/app/etc"
      - -exec
      - chmod
      - g-w
      - "{}"
      - +
  changed_when: true
  when: magento_configuration_paths_with_group_write.stdout | length > 0

- name: Read Magento admin URI
  ansible.builtin.command:
    argv:
      - "{{ magento_app_root }}/bin/magento"
      - info:adminuri
  become: true
  become_user: "{{ magento_app_user }}"
  register: magento_admin_uri_raw
  changed_when: false

- name: Build Magento install summary facts
  ansible.builtin.set_fact:
    magento_admin_uri_path: >-
      {{
        magento_admin_uri_raw.stdout
        | trim
        | regex_replace('^Admin URI:\s*', '')
      }}
    magento_admin_url: >-
      {{
        (magento_base_url | regex_replace('/+$', ''))
        ~ (
          magento_admin_uri_raw.stdout
          | trim
          | regex_replace('^Admin URI:\s*', '')
        )
      }}
    magento_remote_install_summary_path: "{{ magento_app_root }}/var/ansible-install-summary.yml"
    magento_local_install_summary_dir: "{{ playbook_dir | dirname }}/artifacts"
    magento_local_install_summary_path: >-
      {{
        (playbook_dir | dirname)
        ~ '/artifacts/'
        ~ inventory_hostname
        ~ '-magento-install-summary.yml'
      }}

- name: Write Magento install summary on the server
  ansible.builtin.template:
    src: install-summary.yml.j2
    dest: "{{ magento_remote_install_summary_path }}"
    owner: "{{ magento_app_user }}"
    group: "{{ magento_app_group }}"
    mode: "0640"

- name: Ensure local Magento summary artifact directory exists
  ansible.builtin.file:
    path: "{{ magento_local_install_summary_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Write local Magento install summary artifact
  ansible.builtin.template:
    src: install-summary.yml.j2
    dest: "{{ magento_local_install_summary_path }}"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: Show Magento install summary locations
  ansible.builtin.debug:
    msg:
      - "Magento admin URL: {{ magento_admin_url }}"
      - "Magento admin URI path: {{ magento_admin_uri_path }}"
      - "Remote install summary: {{ magento_remote_install_summary_path }}"
      - "Local install summary: {{ magento_local_install_summary_path }}"
